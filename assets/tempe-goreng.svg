<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Ilustrasi tempe goreng keemasan">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#120803"/>
      <stop offset="0.55" stop-color="#341708"/>
      <stop offset="1" stop-color="#070402"/>
    </linearGradient>
    <radialGradient id="warm" cx="70%" cy="22%" r="70%">
      <stop offset="0" stop-color="#f97316" stop-opacity="0.50"/>
      <stop offset="0.55" stop-color="#f59e0b" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe7bf"/>
      <stop offset="0.35" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#7c2d12"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <pattern id="beans" width="42" height="42" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="6" fill="rgba(255,255,255,0.13)"/>
      <circle cx="30" cy="26" r="5" fill="rgba(0,0,0,0.10)"/>
      <circle cx="18" cy="32" r="4" fill="rgba(255,255,255,0.10)"/>
    </pattern>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#warm)"/>

  <!-- paper base -->
  <g filter="url(#shadow)">
    <path d="M190 520 C 185 450, 230 400, 300 390 L 960 300 C 1040 290, 1090 355, 1078 430 L 1020 650 C 1006 715, 952 760, 885 768 L 290 790 C 220 798, 170 740, 176 670 Z"
          fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
    <path d="M210 530 C 208 470, 248 430, 305 422 L 945 338 C 1010 330, 1050 382, 1040 442 L 990 640 C 978 690, 936 724, 885 730 L 304 752 C 250 756, 210 712, 212 658 Z"
          fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  </g>

  <!-- tempe slices -->
  <g filter="url(#shadow)">
    <g transform="translate(300 420) rotate(-12)">
      <rect x="0" y="0" width="360" height="160" rx="40" fill="url(#gold)" stroke="rgba(60,25,6,0.55)" stroke-width="6"/>
      <rect x="16" y="16" width="328" height="128" rx="34" fill="url(#beans)" opacity="0.75"/>
      <circle cx="310" cy="44" r="10" fill="rgba(255,255,255,0.16)"/>
      <circle cx="86" cy="112" r="9" fill="rgba(0,0,0,0.10)"/>
    </g>
    <g transform="translate(560 380) rotate(10)">
      <rect x="0" y="0" width="390" height="170" rx="44" fill="url(#gold)" stroke="rgba(60,25,6,0.55)" stroke-width="6"/>
      <rect x="18" y="18" width="354" height="134" rx="36" fill="url(#beans)" opacity="0.75"/>
      <circle cx="330" cy="56" r="10" fill="rgba(255,255,255,0.14)"/>
      <circle cx="118" cy="120" r="9" fill="rgba(0,0,0,0.10)"/>
    </g>
    <g transform="translate(420 540) rotate(6)">
      <rect x="0" y="0" width="420" height="175" rx="48" fill="url(#gold)" stroke="rgba(60,25,6,0.55)" stroke-width="6"/>
      <rect x="20" y="20" width="380" height="135" rx="38" fill="url(#beans)" opacity="0.75"/>
      <circle cx="352" cy="62" r="10" fill="rgba(255,255,255,0.14)"/>
      <circle cx="146" cy="132" r="9" fill="rgba(0,0,0,0.10)"/>
    </g>
  </g>

  <!-- label -->
  <g opacity="0.92">
    <rect x="54" y="56" width="280" height="54" rx="18" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.12)"/>
    <text x="76" y="92" fill="#fff7ed" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-size="22" font-weight="900">
      Tempe Goreng
    </text>
  </g>
</svg>
