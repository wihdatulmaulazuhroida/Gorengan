<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="Ilustrasi gorengan hangat dengan warna hangat">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a1609"/>
      <stop offset="0.5" stop-color="#5b2b0e"/>
      <stop offset="1" stop-color="#120a04"/>
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="18%" r="75%">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#f97316" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8e7c6"/>
      <stop offset="1" stop-color="#d8b784"/>
    </linearGradient>
    <linearGradient id="fry" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd29a"/>
      <stop offset="0.45" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#92400e"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="steam" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>
  <rect width="1200" height="760" fill="url(#glow)"/>

  <!-- table texture -->
  <g opacity="0.22">
    <path d="M0 585 C 220 540, 420 635, 640 595 S 1040 560, 1200 610 L 1200 760 L 0 760 Z" fill="#000"/>
    <path d="M0 625 C 260 585, 460 690, 700 640 S 1020 610, 1200 655 L 1200 760 L 0 760 Z" fill="#000"/>
  </g>

  <!-- tray -->
  <g filter="url(#softShadow)">
    <path d="M160 450 C 170 410, 210 380, 255 372 L 950 250 C 1010 240, 1055 286, 1048 346 L 990 600 C 982 650, 938 686, 886 690 L 250 740 C 188 745, 140 690, 152 630 Z"
          fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
    <path d="M185 465 C 193 432, 222 407, 259 400 L 935 286 C 985 278, 1022 314, 1016 355 L 962 587 C 956 628, 920 658, 878 662 L 262 708 C 210 712, 169 666, 179 616 Z"
          fill="url(#paper)"/>
  </g>

  <!-- gorengan pieces -->
  <g>
    <g transform="translate(255 438) rotate(-10)">
      <rect x="0" y="0" width="350" height="170" rx="46" fill="url(#fry)" stroke="rgba(60,25,6,0.55)" stroke-width="6"/>
      <circle cx="86" cy="64" r="14" fill="rgba(255,255,255,0.22)"/>
      <circle cx="140" cy="110" r="10" fill="rgba(0,0,0,0.12)"/>
      <circle cx="222" cy="72" r="12" fill="rgba(255,255,255,0.18)"/>
      <circle cx="276" cy="118" r="9" fill="rgba(0,0,0,0.10)"/>
    </g>
    <g transform="translate(520 370) rotate(13)">
      <rect x="0" y="0" width="410" height="190" rx="54" fill="url(#fry)" stroke="rgba(60,25,6,0.55)" stroke-width="6"/>
      <circle cx="92" cy="82" r="14" fill="rgba(255,255,255,0.20)"/>
      <circle cx="154" cy="124" r="10" fill="rgba(0,0,0,0.12)"/>
      <circle cx="260" cy="78" r="12" fill="rgba(255,255,255,0.16)"/>
      <circle cx="320" cy="134" r="9" fill="rgba(0,0,0,0.10)"/>
    </g>
    <g transform="translate(360 540) rotate(6)">
      <rect x="0" y="0" width="420" height="180" rx="56" fill="url(#fry)" stroke="rgba(60,25,6,0.55)" stroke-width="6"/>
      <circle cx="120" cy="86" r="14" fill="rgba(255,255,255,0.20)"/>
      <circle cx="205" cy="128" r="10" fill="rgba(0,0,0,0.12)"/>
      <circle cx="286" cy="78" r="12" fill="rgba(255,255,255,0.16)"/>
      <circle cx="352" cy="126" r="9" fill="rgba(0,0,0,0.10)"/>
    </g>
  </g>

  <!-- steam -->
  <g opacity="0.55" filter="url(#steam)">
    <path d="M365 210 C 335 160, 398 130, 375 78 C 355 30, 408 16, 422 52 C 442 102, 380 132, 410 180 C 440 228, 392 252, 365 210 Z"
          fill="#ffffff"/>
    <path d="M565 190 C 540 146, 592 120, 574 78 C 560 42, 598 28, 612 52 C 632 90, 580 120, 603 160 C 628 205, 592 225, 565 190 Z"
          fill="#ffffff"/>
    <path d="M760 210 C 732 162, 790 136, 772 92 C 758 56, 798 38, 812 64 C 832 102, 784 132, 804 172 C 828 218, 792 246, 760 210 Z"
          fill="#ffffff"/>
  </g>

  <!-- corner label -->
  <g opacity="0.9">
    <rect x="48" y="54" width="330" height="54" rx="18" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.12)"/>
    <text x="70" y="90" fill="#fff7ed" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-size="22" font-weight="800">
      Gorengan Hangat " Fresh
    </text>
  </g>
</svg>
