<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Placeholder menu segera hadir">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#160b05"/>
      <stop offset="0.55" stop-color="#3c1c09"/>
      <stop offset="1" stop-color="#070402"/>
    </linearGradient>
    <radialGradient id="warm" cx="40%" cy="18%" r="70%">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.45"/>
      <stop offset="0.6" stop-color="#f97316" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#warm)"/>

  <g filter="url(#shadow)">
    <rect x="180" y="160" width="840" height="480" rx="44" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
    <rect x="220" y="200" width="760" height="400" rx="38" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  </g>

  <g opacity="0.92">
    <circle cx="600" cy="380" r="86" fill="rgba(0,0,0,0.28)" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
    <path d="M600 330 v110 M545 385 h110" stroke="#ffd7a3" stroke-width="14" stroke-linecap="round"/>
  </g>

  <g opacity="0.92">
    <text x="600" y="560" fill="#fff7ed" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-size="40" font-weight="900" text-anchor="middle">
      Segera Hadir
    </text>
    <text x="600" y="610" fill="rgba(255,247,237,0.72)" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-size="20" font-weight="700" text-anchor="middle">
      Menu baru akan tampil di sini
    </text>
  </g>
</svg>
