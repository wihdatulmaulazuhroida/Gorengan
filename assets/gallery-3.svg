<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Galeri gorengan hangat 3">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080503"/>
      <stop offset="0.55" stop-color="#2b1407"/>
      <stop offset="1" stop-color="#050302"/>
    </linearGradient>
    <radialGradient id="warm" cx="42%" cy="18%" r="70%">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.52"/>
      <stop offset="0.55" stop-color="#f97316" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe7bf"/>
      <stop offset="0.35" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#7c2d12"/>
    </linearGradient>
    <pattern id="beans" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="6" fill="rgba(255,255,255,0.12)"/>
      <circle cx="32" cy="28" r="5" fill="rgba(0,0,0,0.10)"/>
      <circle cx="18" cy="34" r="4" fill="rgba(255,255,255,0.10)"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#warm)"/>

  <g>
    <ellipse cx="600" cy="585" rx="440" ry="165" fill="rgba(0,0,0,0.28)"/>
    <ellipse cx="600" cy="565" rx="450" ry="175" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
    <g transform="translate(300 410) rotate(-10)">
