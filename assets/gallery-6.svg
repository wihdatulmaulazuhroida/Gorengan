<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Galeri gorengan hangat 6">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070402"/>
      <stop offset="0.55" stop-color="#231006"/>
      <stop offset="1" stop-color="#050302"/>
    </linearGradient>
    <radialGradient id="warm" cx="32%" cy="20%" r="70%">
      <stop offset="0" stop-color="#f97316" stop-opacity="0.50"/>
      <stop offset="0.6" stop-color="#f59e0b" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe0b8"/>
      <stop offset="0.4" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="sauce" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#7c2d12"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#warm)"/>

  <g opacity="0.26">
    <path d="M0 620 C 260 570, 460 700, 700 650 S 1020 610, 1200 680 L 1200 800 L 0 800 Z" fill="#000"/>
  </g>

  <g>
    <ellipse cx="600" cy="590" rx="450" ry="170" fill="rgba(0,0,0,0.28)"/>
    <ellipse cx="600" cy="570" rx="460" ry="178" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>

    <!-- gorengan -->
    <g transform="translate(280 420) rotate(-9)">
      <rect x="0" y="0" width="350" height="160" rx="46" fill="url(#gold)" stroke="rgba(60,25,6,0.50)" stroke-width="6"/>
      <circle cx="94" cy="62" r="12" fill="rgba(255,255,255,0.18)"/>
      <circle cx="246" cy="108" r="9" fill="rgba(0,0,0,0.10)"/>
    </g>
    <g transform="translate(540 390) rotate(12)">
      <rect x="0" y="0" width="380" height="175" rx="50" fill="url(#gold)" stroke="rgba(60,25,6,0.50)" stroke-width="6"/>
      <circle cx="110" cy="72" r="12" fill="rgba(255,255,255,0.16)"/>
      <circle cx="282" cy="132" r="9" fill="rgba(0,0,0,0.10)"/>
    </g>

    <!-- sauce bowl -->
    <g transform="translate(805 520)">
      <ellipse cx="0" cy="50" rx="130" ry="60" fill="rgba(0,0,0,0.30)"/>
      <ellipse cx="0" cy="38" rx="140" ry="66" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
      <ellipse cx="0" cy="34" rx="110" ry="50" fill="url(#sauce)" opacity="0.92"/>
      <ellipse cx="-30" cy="22" rx="28" ry="14" fill="rgba(255,255,255,0.18)"/>
    </g>
  </g>
</svg>
