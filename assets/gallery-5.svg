<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Galeri gorengan hangat 5">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070402"/>
      <stop offset="0.55" stop-color="#221006"/>
      <stop offset="1" stop-color="#050302"/>
    </linearGradient>
    <radialGradient id="warm" cx="68%" cy="18%" r="70%">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.50"/>
      <stop offset="0.6" stop-color="#f97316" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe0b8"/>
      <stop offset="0.4" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe7bf"/>
      <stop offset="0.35" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#7c2d12"/>
    </linearGradient>
    <pattern id="beans" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="6" fill="rgba(255,255,255,0.12)"/>
      <circle cx="32" cy="28" r="5" fill="rgba(0,0,0,0.10)"/>
      <circle cx="18" cy="34" r="4" fill="rgba(255,255,255,0.10)"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#warm)"/>

  <g>
    <ellipse cx="600" cy="590" rx="450" ry="170" fill="rgba(0,0,0,0.28)"/>
    <ellipse cx="600" cy="570" rx="460" ry="178" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
    <g transform="translate(270 420) rotate(-9)">
      <rect x="0" y="0" width="330" height="150" rx="44" fill="url(#gold)" stroke="rgba(60,25,6,0.50)" stroke-width="6"/>
      <circle cx="92" cy="62" r="12" fill="rgba(255,255,255,0.18)"/>
    </g>
    <g transform="translate(520 390) rotate(10)">
      <rect x="0" y="0" width="360" height="160" rx="46" fill="url(#gold2)" stroke="rgba(60,25,6,0.55)" stroke-width="6"/>
      <rect x="16" y="16" width="328" height="128" rx="36" fill="url(#beans)" opacity="0.8"/>
    </g>
    <g transform="translate(420 540) rotate(6)">
