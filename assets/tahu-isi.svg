<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Ilustrasi tahu isi goreng">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#160b05"/>
      <stop offset="0.55" stop-color="#3c1c09"/>
      <stop offset="1" stop-color="#080503"/>
    </linearGradient>
    <radialGradient id="warm" cx="35%" cy="28%" r="70%">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#f97316" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe0b8"/>
      <stop offset="0.35" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#92400e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#warm)"/>

  <!-- plate -->
  <g filter="url(#shadow)">
    <ellipse cx="610" cy="560" rx="430" ry="170" fill="rgba(0,0,0,0.30)" />
    <ellipse cx="600" cy="540" rx="440" ry="180" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
    <ellipse cx="600" cy="520" rx="390" ry="145" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  </g>

  <!-- tahu pieces -->
  <g filter="url(#shadow)">
    <g transform="translate(290 360) rotate(-10)">
      <rect x="0" y="0" width="320" height="180" rx="42" fill="url(#gold)" stroke="rgba(60,25,6,0.55)" stroke-width="6"/>
      <path d="M58 92 C 110 52, 170 50, 230 84 C 196 126, 130 136, 88 116 C 72 108, 62 102, 58 92 Z"
            fill="rgba(255,255,255,0.22)"/>
      <path d="M110 120 C 150 90, 190 90, 228 112 C 206 140, 160 150, 130 140 C 120 136, 114 130, 110 120 Z"
            fill="rgba(0,0,0,0.10)"/>
      <circle cx="260" cy="54" r="12" fill="rgba(255,255,255,0.18)"/>
      <circle cx="78" cy="52" r="10" fill="rgba(0,0,0,0.10)"/>
    </g>

    <g transform="translate(520 320) rotate(12)">
      <rect x="0" y="0" width="360" height="210" rx="48" fill="url(#gold)" stroke="rgba(60,25,6,0.55)" stroke-width="6"/>
      <path d="M70 102 C 140 62, 220 60, 288 92 C 256 152, 180 170, 122 148 C 96 138, 80 124, 70 102 Z"
            fill="rgba(255,255,255,0.20)"/>
      <path d="M138 152 C 184 116, 230 118, 274 144 C 246 180, 198 190, 162 178 C 150 174, 144 166, 138 152 Z"
            fill="rgba(0,0,0,0.10)"/>
      <circle cx="300" cy="62" r="12" fill="rgba(255,255,255,0.16)"/>
      <circle cx="96" cy="62" r="10" fill="rgba(0,0,0,0.10)"/>
    </g>
  </g>

  <!-- label -->
  <g opacity="0.92">
    <rect x="54" y="56" width="230" height="54" rx="18" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.12)"/>
    <text x="76" y="92" fill="#fff7ed" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-size="22" font-weight="900">
      Tahu Isi
    </text>
  </g>
</svg>
